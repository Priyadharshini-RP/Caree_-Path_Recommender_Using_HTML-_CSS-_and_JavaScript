<!DOCTYPE html>
<html>
<head>
    <title>Career Path Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🎓 Career Path Recommender</h1>

    <h3>Select Your Interest:</h3>
    <select id="interest">
        <option value="">--Select--</option>
        <option value="technology">Technology</option>
        <option value="design">Design</option>
        <option value="business">Business</option>
        <option value="health">Healthcare</option>
    </select>

    <h3>Select Your Skill:</h3>
    <select id="skill">
        <option value="">--Select--</option>
        <option value="problem">Problem Solving</option>
        <option value="creativity">Creativity</option>
        <option value="communication">Communication</option>
        <option value="analysis">Analytical Thinking</option>
    </select>

    <button onclick="recommendCareer()">Get Recommendation</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
